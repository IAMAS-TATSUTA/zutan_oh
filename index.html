<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>zutan</title>
        <link rel="stylesheet" href="src/style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <main class="app">
      <section class="tablet">
        <div class="reader-grid">
          <div class="reader reader-1" data-reader="1"></div>
          <div class="reader reader-2" data-reader="2"></div>
          <div class="reader reader-3" data-reader="3"></div>
          <div class="reader reader-4" data-reader="4"></div>
        </div>

        <div class="knob-row">
        <div class="knob-wrap reader-1" data-reader="1">
          <div class="knob" data-reader="1">
            <div class="knob-indicator"></div>
          </div>
        </div>

        <div class="knob-wrap reader-2" data-reader="2">
          <div class="knob" data-reader="2">
            <div class="knob-indicator"></div>
          </div>
        </div>

        <div class="knob-wrap reader-3" data-reader="3">
          <div class="knob" data-reader="3">
            <div class="knob-indicator"></div>
          </div>
        </div>

        <div class="knob-wrap reader-4" data-reader="4">
          <div class="knob" data-reader="4">
            <div class="knob-indicator"></div>
          </div>
        </div>
      </div>
        </div>
      </section>

      <section id="card-tray" class="card-tray"></section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
